<svg width="750" height="400" viewBox="0 0 750 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 背景渐变：淡蓝色 -->
    <linearGradient id="bg_gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>

    <!-- 冠军台金光 -->
    <radialGradient id="gold_glow" cx="375" cy="200" r="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>

    <!-- 领奖台阴影 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feOffset dx="0" dy="5" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="750" height="400" fill="url(#bg_gradient)"/>
  
  <!-- 冠军金光 -->
  <circle cx="375" cy="250" r="200" fill="url(#gold_glow)"/>

  <!-- 领奖台主体 -->
  <g filter="url(#shadow)">
    <!-- 第三名 (左) - 铜色 -->
    <rect x="50" y="280" width="180" height="80" rx="4" fill="#CD7F32" stroke="#8B4513" stroke-width="2"/>
    <rect x="50" y="280" width="180" height="10" rx="2" fill="#E3A869" opacity="0.4"/>
    
    <!-- 第二名 (右) - 银色 -->
    <rect x="520" y="250" width="180" height="110" rx="4" fill="#C0C0C0" stroke="#7F8C8D" stroke-width="2"/>
    <rect x="520" y="250" width="180" height="10" rx="2" fill="#ECF0F1" opacity="0.5"/>

    <!-- 第一名 (中) - 金黄色 -->
    <rect x="260" y="200" width="230" height="160" rx="4" fill="#FFD700" stroke="#B8860B" stroke-width="2"/>
    <rect x="260" y="200" width="230" height="12" rx="2" fill="#FFF176" opacity="0.6"/>

    <!-- 冠军台上的小奖杯 -->
    <g transform="translate(355, 240) scale(0.8)">
      <path d="M10 5 H40 L45 15 Q45 25 35 30 L30 45 H20 L15 30 Q5 25 5 15 L10 5 Z" fill="#B8860B" stroke="#8B6B00" stroke-width="2"/>
      <path d="M5 10 Q0 15 5 20 M45 10 Q50 15 45 20" fill="none" stroke="#8B6B00" stroke-width="2"/>
      <rect x="15" y="45" width="20" height="5" fill="#8B6B00"/>
    </g>
  </g>

  <!-- 装饰：红色线索细绳 (保持侦探氛围) -->
  <path d="M0 150 C 150 130, 300 170, 450 140 S 750 160" stroke="#C0392B" stroke-width="1" stroke-dasharray="5 5" opacity="0.2"/>
</svg>